<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="14" fill="#0f172a"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="18" font-weight="bold">Token 拆分：中文 vs 英文</text>

  <!-- Chinese section -->
  <text x="200" y="70" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="15" font-weight="bold">中文输入</text>
  <rect x="50" y="85" width="700" height="28" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="105" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="15">人工智能改变世界</text>

  <text x="200" y="145" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="13">Token 拆分：</text>
  <rect x="50" y="162" width="140" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="120" y="186" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="13">人工</text>
  <rect x="202" y="162" width="140" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="272" y="186" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="13">智能</text>
  <rect x="354" y="162" width="140" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="424" y="186" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="13">改变</text>
  <rect x="506" y="162" width="140" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="576" y="186" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="13">世界</text>

  <text x="700" y="185" fill="#94a3b8" font-family="monospace" font-size="12">= 4 tokens</text>

  <!-- Cost -->
  <rect x="200" y="220" width="400" height="32" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="242" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="12">7 个汉字 → 4 tokens（平均 1.75 字/token）</text>

  <!-- English section -->
  <text x="200" y="280" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="15" font-weight="bold">英文输入</text>
  <rect x="50" y="295" width="700" height="28" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="315" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="15">Artificial Intelligence changes the world</text>

  <text x="200" y="355" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="13">Token 拆分：</text>
  <rect x="50" y="360" width="100" height="36" rx="6" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="100" y="384" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="11">Art</text>
  <rect x="160" y="360" width="100" height="36" rx="6" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="210" y="384" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="11">ificial</text>
  <rect x="270" y="360" width="120" height="36" rx="6" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="330" y="384" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="11">Intelligence</text>
  <rect x="400" y="360" width="90" height="36" rx="6" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="445" y="384" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="11">changes</text>
  <rect x="500" y="360" width="90" height="36" rx="6" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="545" y="384" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="11">the</text>
  <rect x="600" y="360" width="140" height="36" rx="6" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="670" y="384" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="11">world</text>
</svg>
