<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <rect width="800" height="380" rx="14" fill="#0f172a"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="17" font-weight="bold">Function Calling 机制</text>

  <!-- User -->
  <rect x="30" y="65" width="130" height="45" rx="8" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="95" y="85" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="12">👤 用户</text>
  <text x="95" y="101" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">"北京天气?"</text>

  <text x="180" y="92" fill="#6366f1" font-family="sans-serif" font-size="20">→</text>

  <!-- LLM -->
  <rect x="210" y="55" width="180" height="65" rx="8" fill="#3a1a3a" stroke="#a855f7"/>
  <text x="300" y="75" text-anchor="middle" fill="#d8b4fe" font-family="sans-serif" font-size="12" font-weight="bold">🧠 LLM 分析</text>
  <text x="300" y="95" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="10">"我需要调用天气API"</text>
  <text x="300" y="111" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10">→ 返回函数调用请求</text>

  <text x="410" y="92" fill="#6366f1" font-family="sans-serif" font-size="20">→</text>

  <!-- Your Code -->
  <rect x="440" y="55" width="160" height="65" rx="8" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="520" y="75" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="12" font-weight="bold">💻 你的代码</text>
  <text x="520" y="95" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10">get_weather(</text>
  <text x="520" y="111" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10">   "北京")</text>

  <text x="620" y="92" fill="#6366f1" font-family="sans-serif" font-size="20">→</text>

  <!-- API -->
  <rect x="650" y="55" width="130" height="65" rx="8" fill="#1a2a3a" stroke="#06b6d4"/>
  <text x="715" y="75" text-anchor="middle" fill="#67e8f9" font-family="sans-serif" font-size="12" font-weight="bold">🌐 天气API</text>
  <text x="715" y="95" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10">返回: 25°C</text>
  <text x="715" y="111" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10">晴天</text>

  <!-- Return path -->
  <text x="400" y="155" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="14">⬇ 结果返回 ⬇</text>

  <text x="690" y="155" fill="#6366f1" font-family="sans-serif" font-size="16">←</text>
  <text x="520" y="155" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">"25°C 晴天"</text>

  <text x="300" y="175" text-anchor="middle" fill="#6366f1" font-family="sans-serif" font-size="16">←</text>

  <!-- Final response -->
  <rect x="210" y="190" width="180" height="45" rx="8" fill="#3a1a3a" stroke="#a855f7"/>
  <text x="300" y="210" text-anchor="middle" fill="#d8b4fe" font-family="sans-serif" font-size="12" font-weight="bold">🧠 LLM 生成回复</text>
  <text x="300" y="228" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="10">"北京今天25°C，晴天"</text>

  <text x="210" y="215" fill="#6366f1" font-family="sans-serif" font-size="16">←</text>
  <text x="95" y="215" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">收到回复!</text>

  <!-- Key insight box -->
  <rect x="80" y="270" width="640" height="80" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="295" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="bold">核心要点</text>
  <text x="400" y="318" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="12">LLM 不直接调用 API！它只「说」要调哪个函数+什么参数 → 你的代码去执行 → 结果还给 LLM</text>
  <text x="400" y="338" text-anchor="middle" fill="#6366f1" font-family="sans-serif" font-size="12" font-weight="bold">这个「说 → 做 → 还」的三角循环，就是 Agent 的基础</text>

</svg>
