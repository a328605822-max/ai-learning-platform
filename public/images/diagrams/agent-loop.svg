<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" fill="none">
  <rect width="700" height="380" rx="14" fill="#0f172a"/>

  <text x="350" y="30" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="18" font-weight="bold">Agent 循环：思考 → 行动 → 观察</text>

  <!-- Central cycle: diamond layout -->
  <!-- THINK -->
  <rect x="250" y="55" width="200" height="55" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="74" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="15" font-weight="bold">🧠 思考 (Reason)</text>
  <text x="350" y="96" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">我需要调用天气 API 来回答这个问题</text>

  <!-- Arrow down -->
  <text x="350" y="130" text-anchor="middle" fill="#64748b" font-size="16">↓</text>

  <!-- ACT -->
  <rect x="250" y="142" width="200" height="55" rx="10" fill="#1a3a1a" stroke="#22c55e" stroke-width="2"/>
  <text x="350" y="161" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="15" font-weight="bold">🔧 行动 (Act)</text>
  <text x="350" y="183" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">调用 get_weather(city="北京")</text>

  <!-- Arrow down -->
  <text x="350" y="215" text-anchor="middle" fill="#64748b" font-size="16">↓</text>

  <!-- OBSERVE -->
  <rect x="250" y="228" width="200" height="55" rx="10" fill="#3a2a1a" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="247" text-anchor="middle" fill="#fcd34d" font-family="sans-serif" font-size="15" font-weight="bold">👁 观察 (Observe)</text>
  <text x="350" y="269" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">北京当前：晴，22°C</text>

  <!-- Loop back arrow -->
  <path d="M 470 255 C 530 255, 530 85, 470 85" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="6 3"/>
  <text x="545" y="170" fill="#818cf8" font-family="sans-serif" font-size="11">循环直到</text>
  <text x="545" y="188" fill="#818cf8" font-family="sans-serif" font-size="11">任务完成</text>

  <!-- Left side: User Request -->
  <rect x="30" y="70" width="150" height="45" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="105" y="90" text-anchor="middle" fill="#cbd5e1" font-family="sans-serif" font-size="12" font-weight="bold">用户请求</text>
  <text x="105" y="107" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">"北京今天天气"</text>

  <text x="195" y="95" fill="#64748b" font-size="16">→</text>

  <!-- Right side: Final Answer -->
  <rect x="520" y="235" width="150" height="45" rx="8" fill="#1a2a1a" stroke="#22c55e"/>
  <text x="595" y="255" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="12" font-weight="bold">最终回答</text>
  <text x="595" y="272" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">"北京今天晴 22°C"</text>

  <!-- Bottom note -->
  <rect x="80" y="315" width="540" height="42" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="350" y="335" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">Agent 不是一次性给出答案，而是通过多轮「思考-行动-观察」逐步完成复杂任务</text>
  <text x="350" y="352" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">每次循环中，AI 自己决定下一步该做什么，直到认为任务已完成</text>
</svg>
