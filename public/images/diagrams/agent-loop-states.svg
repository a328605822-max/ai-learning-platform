<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <rect width="800" height="420" rx="14" fill="#0f172a"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="17" font-weight="bold">Agent 循环：思考 → 行动 → 观察</text>

  <!-- Think -->
  <circle cx="400" cy="130" r="65" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="400" y="120" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="bold">🤔 思考</text>
  <text x="400" y="140" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="11">Think</text>
  <text x="400" y="158" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">"我需要什么信息?"</text>

  <!-- Arrow Think -> Act -->
  <text x="530" y="115" fill="#6366f1" font-family="sans-serif" font-size="22">→</text>
  <path d="M 480 160 Q 550 160 550 200 Q 550 240 480 240" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="8,4"/>

  <!-- Act -->
  <circle cx="650" cy="260" r="65" fill="#1a3a1a" stroke="#22c55e" stroke-width="2.5"/>
  <text x="650" y="250" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="14" font-weight="bold">⚡ 行动</text>
  <text x="650" y="270" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="11">Act</text>
  <text x="650" y="288" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">调用工具/API</text>

  <!-- Arrow Act -> Observe -->
  <text x="535" y="305" fill="#6366f1" font-family="sans-serif" font-size="22">→</text>

  <!-- Observe -->
  <circle cx="400" cy="350" r="65" fill="#3a2a0a" stroke="#eab308" stroke-width="2.5"/>
  <text x="400" y="340" text-anchor="middle" fill="#fde68a" font-family="sans-serif" font-size="14" font-weight="bold">👁️ 观察</text>
  <text x="400" y="360" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="11">Observe</text>
  <text x="400" y="378" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">"结果是什么?"</text>

  <!-- Arrow Observe -> Think -->
  <text x="265" y="305" fill="#6366f1" font-family="sans-serif" font-size="22">←</text>
  <path d="M 320 280 Q 150 280 150 200 Q 150 120 320 120" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="8,4"/>

  <!-- Decision -->
  <rect x="30" y="55" width="190" height="50" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="125" y="72" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="bold">任务完成?</text>
  <text x="125" y="92" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">否 → 继续循环</text>

  <text x="240" y="85" fill="#6366f1" font-family="sans-serif" font-size="16">→</text>

  <!-- Done -->
  <rect x="580" y="30" width="160" height="50" rx="8" fill="#1a3a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="660" y="50" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="11" font-weight="bold">✅ 是 → 输出结果</text>
  <text x="660" y="70" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">任务结束</text>

</svg>
