<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="14" fill="#0f172a"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="17" font-weight="bold">Chroma 向量数据库架构</text>

  <!-- User input -->
  <rect x="30" y="60" width="160" height="40" rx="8" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="110" y="86" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="13" font-weight="bold">📝 文档输入</text>

  <text x="210" y="86" fill="#6366f1" font-family="sans-serif" font-size="20">→</text>

  <!-- Chunking -->
  <rect x="240" y="60" width="160" height="40" rx="8" fill="#3a1a3a" stroke="#a855f7"/>
  <text x="320" y="86" text-anchor="middle" fill="#d8b4fe" font-family="sans-serif" font-size="13" font-weight="bold">✂️ 文本分块</text>

  <text x="420" y="86" fill="#6366f1" font-family="sans-serif" font-size="20">→</text>

  <!-- Embedding -->
  <rect x="450" y="60" width="160" height="40" rx="8" fill="#1a2a3a" stroke="#06b6d4"/>
  <text x="530" y="86" text-anchor="middle" fill="#67e8f9" font-family="sans-serif" font-size="13" font-weight="bold">🧮 向量化Embedding</text>

  <text x="630" y="86" fill="#6366f1" font-family="sans-serif" font-size="20">→</text>

  <!-- Storage -->
  <rect x="660" y="60" width="120" height="40" rx="8" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="720" y="86" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="13" font-weight="bold">💾 存储</text>

  <!-- Down arrow -->
  <text x="400" y="140" text-anchor="middle" fill="#6366f1" font-family="sans-serif" font-size="24">↓</text>

  <!-- DB center -->
  <rect x="250" y="160" width="300" height="60" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="186" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="bold">Chroma 向量数据库</text>
  <text x="400" y="207" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Collection: "my_docs" · 1536维向量</text>

  <!-- Query side -->
  <text x="400" y="260" text-anchor="middle" fill="#6366f1" font-family="sans-serif" font-size="20">↑</text>

  <rect x="30" y="275" width="160" height="40" rx="8" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="110" y="301" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="13" font-weight="bold">🔍 用户查询</text>

  <text x="210" y="301" fill="#6366f1" font-family="sans-serif" font-size="20">→</text>

  <rect x="240" y="275" width="160" height="40" rx="8" fill="#1a2a3a" stroke="#06b6d4"/>
  <text x="320" y="301" text-anchor="middle" fill="#67e8f9" font-family="sans-serif" font-size="13" font-weight="bold">🧮 查询向量化</text>

  <text x="420" y="301" fill="#6366f1" font-family="sans-serif" font-size="20">→</text>

  <rect x="450" y="275" width="320" height="40" rx="8" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="610" y="296" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="13" font-weight="bold">📊 Top-K 相似度检索</text>
  <text x="610" y="310" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="10">返回最相似的 K 个文档块</text>

</svg>
