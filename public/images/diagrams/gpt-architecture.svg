<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <rect width="800" height="380" rx="14" fill="#0f172a"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="17" font-weight="bold">微型 GPT 训练流程</text>

  <!-- Step 1: Data -->
  <rect x="30" y="55" width="170" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="115" y="78" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold">1. 准备数据</text>
  <text x="115" y="98" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">莎士比亚文本</text>
  <text x="115" y="112" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">"To be, or not to be"</text>

  <text x="220" y="90" fill="#6366f1" font-family="sans-serif" font-size="18">→</text>

  <!-- Step 2: Tokenize -->
  <rect x="250" y="55" width="160" height="60" rx="8" fill="#1a2a3a" stroke="#06b6d4"/>
  <text x="330" y="78" text-anchor="middle" fill="#67e8f9" font-family="sans-serif" font-size="12" font-weight="bold">2. 字符级Token化</text>
  <text x="330" y="98" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">a→1, b→2, ...</text>
  <text x="330" y="112" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">共65个唯一字符</text>

  <text x="430" y="90" fill="#6366f1" font-family="sans-serif" font-size="18">→</text>

  <!-- Step 3: Train -->
  <rect x="460" y="55" width="160" height="60" rx="8" fill="#3a1a3a" stroke="#a855f7"/>
  <text x="540" y="78" text-anchor="middle" fill="#d8b4fe" font-family="sans-serif" font-size="12" font-weight="bold">3. 训练循环</text>
  <text x="540" y="98" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">前向→Loss→反向</text>
  <text x="540" y="112" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">→更新参数 重复N次</text>

  <text x="640" y="90" fill="#6366f1" font-family="sans-serif" font-size="18">→</text>

  <!-- Step 4: Generate -->
  <rect x="670" y="55" width="110" height="60" rx="8" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="725" y="78" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="12" font-weight="bold">4. 文本生成</text>
  <text x="725" y="98" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">逐字预测</text>

  <!-- Detail: Training Loop -->
  <rect x="30" y="140" width="740" height="90" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="165" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="bold">训练循环详解</text>

  <text x="60" y="195" fill="#3b82f6" font-family="monospace" font-size="11">for batch in data:</text>
  <text x="60" y="215" fill="#93c5fd" font-family="monospace" font-size="11">    ŷ = model(x)         ← 前向传播（预测）</text>
  <text x="60" y="215" fill="#a855f7" font-family="monospace" font-size="11">                         loss = cross_entropy(ŷ, y)</text>
  <text x="520" y="195" fill="#a855f7" font-family="monospace" font-size="11">← 前向传播（预测）</text>
  <text x="520" y="215" fill="#ef4444" font-family="monospace" font-size="11">← 算Loss（差多少）</text>

  <!-- Detail: Architecture -->
  <rect x="30" y="250" width="360" height="110" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="210" y="275" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="12" font-weight="bold">微型 GPT 架构（教学版）</text>
  <text x="55" y="300" fill="#94a3b8" font-family="monospace" font-size="11">Embedding: 65字符 → 128维向量</text>
  <text x="55" y="320" fill="#94a3b8" font-family="monospace" font-size="11">Transformer: 6层 × 256维</text>
  <text x="55" y="340" fill="#94a3b8" font-family="monospace" font-size="11">参数量: ~10M（GPT-3: 175B）</text>
  <text x="55" y="355" fill="#94a3b8" font-family="sans-serif" font-size="10">训练10分钟即可生成「莎士比亚风格」文本</text>

  <!-- Detail: Output -->
  <rect x="410" y="250" width="360" height="110" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="590" y="275" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="12" font-weight="bold">生成效果（训练前后对比）</text>
  <text x="430" y="300" fill="#f87171" font-family="sans-serif" font-size="10">Epoch 0: "jemox fvlk wqpz..."</text>
  <text x="430" y="320" fill="#fca5a5" font-family="monospace" font-size="10">(乱码)</text>
  <text x="430" y="340" fill="#22c55e" font-family="sans-serif" font-size="10">Epoch 100: "To be, or not to be,</text>
  <text x="435" y="355" fill="#86efac" font-family="monospace" font-size="10">that is the question..."</text>

</svg>
