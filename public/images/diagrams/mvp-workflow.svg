<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="14" fill="#0f172a"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="17" font-weight="bold">MVP 开发工作流</text>
  <rect x="30" y="55" width="150" height="45" rx="8" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="105" y="74" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="bold">想法验证</text>
  <text x="105" y="91" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">AI调研+竞品分析</text>
  <text x="205" y="83" fill="#6366f1" font-family="sans-serif" font-size="18">→</text>
  <rect x="230" y="55" width="150" height="45" rx="8" fill="#3a1a3a" stroke="#a855f7"/>
  <text x="305" y="74" text-anchor="middle" fill="#d8b4fe" font-family="sans-serif" font-size="12" font-weight="bold">核心功能</text>
  <text x="305" y="91" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">只做最核心的1个功能</text>
  <text x="405" y="83" fill="#6366f1" font-family="sans-serif" font-size="18">→</text>
  <rect x="430" y="55" width="150" height="45" rx="8" fill="#1a3a1a" stroke="#22c55e"/>
  <text x="505" y="74" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="12" font-weight="bold">AI加速开发</text>
  <text x="505" y="91" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">Cursor/Claude写代码</text>
  <text x="605" y="83" fill="#6366f1" font-family="sans-serif" font-size="18">→</text>
  <rect x="630" y="55" width="140" height="45" rx="8" fill="#3a2a0a" stroke="#eab308"/>
  <text x="700" y="74" text-anchor="middle" fill="#fde68a" font-family="sans-serif" font-size="12" font-weight="bold">部署上线</text>
  <text x="700" y="91" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">Vercel/Railway</text>
  <rect x="130" y="130" width="540" height="60" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="152" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="12" font-weight="bold">AI 编程的核心模式</text>
  <text x="400" y="172" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">你设计架构 → AI 填代码细节 → 你审核修正 → 提交。效率提升 3-5 倍</text>
  <text x="400" y="188" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="10">AI 是 10x 程序员但不是替代——架构判断和产品决策永远是人类的事</text>
  <rect x="80" y="220" width="280" height="80" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="220" y="245" text-anchor="middle" fill="#f87171" font-family="sans-serif" font-size="12" font-weight="bold">MVP 不要做的事</text>
  <text x="100" y="268" fill="#94a3b8" font-family="sans-serif" font-size="11">× 用户注册/登录系统</text>
  <text x="100" y="288" fill="#94a3b8" font-family="sans-serif" font-size="11">× 完美的错误处理</text>
  <rect x="440" y="220" width="280" height="80" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="580" y="245" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="12" font-weight="bold">MVP 必须做的事</text>
  <text x="460" y="268" fill="#94a3b8" font-family="sans-serif" font-size="11">✓ 核心功能可完整跑通</text>
  <text x="460" y="288" fill="#94a3b8" font-family="sans-serif" font-size="11">✓ 自己用它能完成一个任务</text>
</svg>
