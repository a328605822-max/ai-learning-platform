<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="14" fill="#0f172a"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="17" font-weight="bold">Self-Attention 权重可视化</text>

  <!-- Sentence -->
  <text x="400" y="70" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="14">「猫  追  老鼠  ，  它  跑  了」</text>

  <!-- Attention matrix 7x7 -->
  <text x="50" y="105" fill="#94a3b8" font-family="sans-serif" font-size="11">注意力矩阵 (7×7)</text>

  <g transform="translate(30, 115)">
    <!-- Column headers -->
    <text x="42" y="-5" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">猫</text>
    <text x="82" y="-5" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">追</text>
    <text x="122" y="-5" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">老鼠</text>
    <text x="162" y="-5" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">，</text>
    <text x="202" y="-5" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">它</text>
    <text x="242" y="-5" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">跑</text>
    <text x="282" y="-5" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">了</text>

    <!-- Row 1: 猫 -->
    <text x="-5" y="8" fill="#94a3b8" font-family="monospace" font-size="9">猫</text>
    <rect x="0" y="0" width="35" height="22" rx="3" fill="#ef4444" opacity="0.8"/>
    <rect x="40" y="0" width="35" height="22" rx="3" fill="#f87171" opacity="0.4"/>
    <rect x="80" y="0" width="35" height="22" rx="3" fill="#f87171" opacity="0.2"/>
    <rect x="120" y="0" width="35" height="22" rx="3" fill="#1e293b"/>
    <rect x="160" y="0" width="35" height="22" rx="3" fill="#f87171" opacity="0.1"/>
    <rect x="200" y="0" width="35" height="22" rx="3" fill="#1e293b"/>
    <rect x="240" y="0" width="35" height="22" rx="3" fill="#1e293b"/>

    <!-- Row 4 (逗号) -->
    <text x="-5" y="105" fill="#94a3b8" font-family="monospace" font-size="9">它</text>
    <rect x="0" y="100" width="35" height="22" rx="3" fill="#f87171" opacity="0.6"/>
    <rect x="40" y="100" width="35" height="22" rx="3" fill="#f87171" opacity="0.2"/>
    <rect x="80" y="100" width="35" height="22" rx="3" fill="#f87171" opacity="0.3"/>
    <rect x="120" y="100" width="35" height="22" rx="3" fill="#1e293b"/>
    <rect x="160" y="100" width="35" height="22" rx="3" fill="#ef4444" opacity="0.9"/>
    <rect x="200" y="100" width="35" height="22" rx="3" fill="#f87171" opacity="0.1"/>
    <rect x="240" y="100" width="35" height="22" rx="3" fill="#1e293b"/>
  </g>

  <!-- Key Finding -->
  <rect x="380" y="115" width="390" height="60" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="575" y="140" text-anchor="middle" fill="#d8b4fe" font-family="sans-serif" font-size="13" font-weight="bold">关键发现</text>
  <text x="575" y="162" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="12">「它」(第5个词) 高度关注「猫」和「老鼠」(第1和第3个词)</text>

  <!-- Resolution -->
  <rect x="380" y="195" width="390" height="45" rx="8" fill="#1e293b" stroke="#22c55e"/>
  <text x="575" y="215" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="12" font-weight="bold">↓</text>
  <text x="575" y="233" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="12">Attention 告诉模型：「它」指代的是「老鼠」，不是「猫」</text>

  <!-- Heatmap legend -->
  <rect x="30" y="280" width="320" height="40" rx="6" fill="#1e293b" stroke="#334155"/>
  <rect x="45" y="290" width="20" height="20" rx="3" fill="#ef4444" opacity="0.9"/>
  <text x="70" y="305" fill="#94a3b8" font-family="sans-serif" font-size="10">高关注</text>
  <rect x="135" y="290" width="20" height="20" rx="3" fill="#f87171" opacity="0.4"/>
  <text x="160" y="305" fill="#94a3b8" font-family="sans-serif" font-size="10">中关注</text>
  <rect x="225" y="290" width="20" height="20" rx="3" fill="#1e293b" stroke="#334155"/>
  <text x="250" y="305" fill="#94a3b8" font-family="sans-serif" font-size="10">无关注</text>

  <text x="575" y="305" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="11">这就是 Attention 解决「指代消解」问题的方式</text>

</svg>
